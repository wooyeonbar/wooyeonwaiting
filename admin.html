<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우연 — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f7f6f4; --surface: #ffffff; --surface2: #f2f1ef;
  --border: #e8e6e2; --border2: #d8d6d2;
  --text: #1a1916; --text2: #6e6b66; --text3: #a8a49e;
  --accent: #1a1916; --danger: #c0503e; --success: #4a8c5c;
  --warning: #b87c2a; --male: #4a7ab8; --female: #b84a7a;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2rem 1.5rem; width: 100%; max-width: 320px; }
.login-title { font-size: 18px; font-weight: 400; margin-bottom: 0.3rem; }
.login-sub { font-size: 12px; color: var(--text3); margin-bottom: 1.5rem; }
.login-input { width: 100%; padding: 11px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; outline: none; margin-bottom: 10px; }
.login-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
.login-err { font-size: 12px; color: var(--danger); margin-top: 8px; min-height: 16px; text-align: center; }
.admin { display: none; max-width: 480px; margin: 0 auto; padding: 0 1rem 4rem; }
.admin-header { padding: 1.5rem 0 1rem; display: flex; justify-content: space-between; align-items: center; }
.admin-title { font-size: 18px; font-weight: 400; }
.header-btns { display: flex; align-items: center; gap: 8px; }
.open-index-btn { font-size: 11px; color: var(--surface); background: var(--accent); border: none; border-radius: 6px; cursor: pointer; padding: 6px 10px; }
.logout-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; }
.section { margin-bottom: 1rem; }
.section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.6rem; }
.seat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; margin-bottom: 8px; }
.seat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.7rem; }
.seat-name { font-size: 12px; font-weight: 500; }
.seat-meta-nums { font-size: 11px; color: var(--text2); text-align: right; }
.seat-meta-cap { font-size: 10px; color: var(--text3); margin-top: 1px; text-align: right; }
.seat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.seat-input-wrap { display: flex; align-items: center; gap: 6px; }
.seat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.seat-dot.male { background: var(--male); }
.seat-dot.female { background: var(--female); }
.seat-label { font-size: 11px; color: var(--text2); flex: 1; }
.counter { display: flex; align-items: center; }
.counter-btn { width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border); font-size: 16px; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.counter-btn:first-child { border-radius: 6px 0 0 6px; }
.counter-btn:last-child { border-radius: 0 6px 6px 0; }
.counter-btn:hover:not(:disabled) { background: var(--border); }
.counter-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.counter-val { width: 42px; height: 28px; background: var(--bg); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); text-align: center; outline: none; border-left: none; border-right: none; }
.seat-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.seat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.seat-bar-fill.male { background: var(--male); }
.seat-bar-fill.female { background: var(--female); }
.op-status { display: flex; align-items: center; gap: 7px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.op-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.op-dot.on { background: var(--danger); box-shadow: 0 0 5px var(--danger); animation: pulse 2s infinite; }
.op-dot.off { background: var(--text3); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.op-text { font-size: 12px; }
.seat-remain { font-size: 11px; margin-left: auto; font-weight: 500; }
.seat-remain.ok { color: var(--success); }
.seat-remain.warn { color: var(--warning); }
.seat-remain.full { color: var(--danger); }
.waiting-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.waiting-empty { padding: 2rem; text-align: center; font-size: 13px; color: var(--text3); }
.waiting-item { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.waiting-item:last-child { border-bottom: none; }
.waiting-item.hearted { outline: 2px solid #e879a8; outline-offset: -2px; background: #fff5f9; }
.waiting-item.greyed { background: #efefef !important; outline: none !important; }
.waiting-item.greyed .waiting-name { text-decoration: line-through; color: var(--text3); }
.waiting-item.greyed .waiting-meta { color: var(--text3); }
.waiting-item.coming-state { background: #f0f0f0; }
.icon-btns { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.star-btn { background: none; border: none; font-size: 15px; cursor: pointer; line-height: 1; padding: 3px; color: var(--border2); transition: color 0.15s; }
.star-btn.active { color: #f0b429; }
.heart-btn { background: none; border: none; font-size: 15px; cursor: pointer; line-height: 1; padding: 3px; color: var(--border2); transition: color 0.15s; }
.heart-btn.active { color: #e879a8; }
.waiting-num { font-size: 11px; color: var(--text3); min-width: 18px; flex-shrink: 0; }
.waiting-info { flex: 1; min-width: 0; }
.name-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.waiting-name { font-size: 13px; font-weight: 500; }
.waiting-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
.gender-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
.gender-badge.male { background: #eef3fb; color: var(--male); }
.gender-badge.female { background: #fbeef5; color: var(--female); }
.seat-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 500; flex-shrink: 0; }
.seat-badge.table { background: #eef3fb; color: #2a5fa8; }
.seat-badge.dodgy { background: #eef6f1; color: #2a7a4a; }
.seat-badge.free { background: #fdf6e0; color: #8a6020; }
.action-btns { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.action-btn { padding: 5px 7px; border-radius: 6px; font-size: 10px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); }
.action-btn.call { background: #eef6f1; border-color: #c8e0d0; color: var(--success); }
.action-btn.confirm-o { background: var(--success); border-color: var(--success); color: #fff; font-weight: 600; }
.action-btn.confirm-x { background: var(--danger); border-color: var(--danger); color: #fff; font-weight: 600; }
.action-btn.coming { background: #888; border-color: #888; color: #fff; }
.action-btn.done-label { background: #aaa; border-color: #aaa; color: #fff; cursor: default; }
.action-btn.noshow-label { background: var(--danger); border-color: var(--danger); color: #fff; cursor: default; opacity: 0.7; }
.action-btn.noreply-label { background: var(--warning); border-color: var(--warning); color: #fff; cursor: default; opacity: 0.7; }
.action-btn.visitx-label { background: #555; border-color: #555; color: #fff; cursor: default; opacity: 0.7; }
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.stats-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.stat-mini { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; }
.stat-mini-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.stat-mini-val { font-size: 26px; font-weight: 300; color: var(--text); line-height: 1; }
.stat-mini-val.rate { font-size: 22px; }
.stat-mini-unit { font-size: 11px; color: var(--text3); margin-top: 3px; }
.bottom-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
.refresh-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 6px 12px; }
.reset-btn { font-size: 11px; color: var(--danger); background: none; border: 1px solid var(--danger); border-radius: 6px; cursor: pointer; padding: 6px 12px; }
.shuffle-btn { width: 100%; margin-top: 10px; padding: 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; color: var(--text2); letter-spacing: 0.05em; transition: background 0.15s; }
.shuffle-btn:hover:not(:disabled) { background: var(--border); }
.shuffle-btn:disabled { opacity: 0.38; cursor: not-allowed; }
.shuffle-result { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-top: 8px; display: none; }
.shuffle-result.active { display: block; }
.shuffle-group { margin-bottom: 0.9rem; }
.shuffle-group:last-child { margin-bottom: 0; }
.shuffle-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.5rem; }
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.card-tag { font-size: 12px; padding: 3px 9px; border-radius: 5px; font-weight: 500; line-height: 1.6; }
.card-tag.black { background: #1a1916; color: #fff; }
.card-tag.red-card { background: #c0503e; color: #fff; }
.card-tag.extra-black { background: #555; color: #fff; }
.card-tag.extra-red { background: #a03428; color: #fff; }
.card-tag.empty-black { background: #3a3835; color: #aaa; font-size: 11px; }
.card-tag.empty-red { background: #5a2820; color: #e07060; font-size: 11px; }
.shuffle-divider { font-size: 10px; color: var(--text3); padding: 0 4px; align-self: center; }
.table-vis-wrap { margin-top: 8px; }
.table-vis { margin-bottom: 10px; }
.table-vis-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.06em; }
.row-outer, .row-inner { display: flex; gap: 3px; align-items: center; }
.row-inner { margin-top: 2px; padding-left: 13px; }
.seat-spacer { width: 12px; flex-shrink: 0; }
.seat { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
.seat.man { background: #1a1916; color: #fff; }
.seat.woman { background: #c0503e; color: #fff; }
.seat.empty-b { background: #3a3835; color: #666; }
.seat.empty-r { background: #5a2820; color: #a06060; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.dot { display: inline-block; animation: blink 1.2s ease-in-out infinite; color: var(--text3); font-size: 22px; line-height: 1; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
.popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
.popup-overlay.active { display: flex; }
.popup-box { background: var(--surface); border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 300px; }
.popup-title { font-size: 15px; font-weight: 500; margin-bottom: 0.4rem; }
.popup-sub { font-size: 12px; color: var(--text3); margin-bottom: 1.2rem; }
.popup-btns { display: flex; flex-direction: column; gap: 8px; }
.popup-btn { padding: 11px; border-radius: 8px; border: none; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; font-weight: 500; }
.popup-btn.primary { background: var(--accent); color: #fff; }
.popup-btn.warning { background: var(--warning); color: #fff; }
.popup-btn.danger { background: var(--danger); color: #fff; }
.popup-btn.secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <p class="login-title">관리자 로그인</p>
    <p class="login-sub">혼술바 우연 을지로</p>
    <input class="login-input" type="password" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <p class="popup-title" id="popupTitle"></p>
    <p class="popup-sub" id="popupSub"></p>
    <div class="popup-btns" id="popupBtns"></div>
  </div>
</div>

<div class="admin" id="adminWrap">
  <div class="admin-header">
    <p class="admin-title">관리자</p>
    <div class="header-btns">
      <button class="open-index-btn" onclick="openIndexPage()">등록 화면 열기</button>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="section">
    <div class="stats-row">
      <div class="stat-mini">
        <p class="stat-mini-label">전체 대기</p>
        <p class="stat-mini-val" id="totalCount"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span></p>
        <p class="stat-mini-unit">팀</p>
      </div>
      <div class="stat-mini">
        <p class="stat-mini-label">대기 인원</p>
        <p class="stat-mini-val" id="totalPeople"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span></p>
        <p class="stat-mini-unit">명</p>
      </div>
    </div>
  </div>

  <div class="section">
    <p class="section-label">현재 매장 현황</p>
    <div class="seat-card">
      <div class="seat-header">
        <span class="seat-name">테이블석</span>
        <div>
          <div class="seat-meta-nums" id="tMetaNums">남 0명 / 여 0명 / 총 0명</div>
          <div class="seat-meta-cap">최대 26명</div>
        </div>
      </div>
      <div class="seat-row">
        <div class="seat-input-wrap">
          <div class="seat-dot male"></div>
          <span class="seat-label">남성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('tM',-1)">−</button>
            <input class="counter-val" id="tM" type="number" value="0" min="0" max="26" onchange="setSeatDirect('tM', this.value)">
            <button class="counter-btn" id="tMPlus" onclick="updateSeat('tM',1)">+</button>
          </div>
        </div>
        <div class="seat-input-wrap">
          <div class="seat-dot female"></div>
          <span class="seat-label">여성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('tF',-1)">−</button>
            <input class="counter-val" id="tF" type="number" value="0" min="0" max="26" onchange="setSeatDirect('tF', this.value)">
            <button class="counter-btn" id="tFPlus" onclick="updateSeat('tF',1)">+</button>
          </div>
        </div>
      </div>
      <div class="seat-bar"><div class="seat-bar-fill male" id="tMBar" style="width:0%"></div></div>
      <div class="seat-bar" style="margin-top:3px"><div class="seat-bar-fill female" id="tFBar" style="width:0%"></div></div>
      <div class="op-status">
        <div class="op-dot off" id="opDot"></div>
        <span class="op-text" id="opText" style="color:var(--text3)">웨이팅 불가</span>
        <span class="seat-remain ok" id="tRemain">남은 자리 26명</span>
      </div>
      <button class="shuffle-btn" id="shuffleBtn" onclick="showShuffle()" disabled>🃏 자리 섞기</button>
    </div>
    <div class="shuffle-result" id="shuffleResult">
      <div class="shuffle-group">
        <div class="shuffle-label">남자 — 카드</div>
        <div class="card-tags" id="menCards"></div>
      </div>
      <div class="shuffle-group">
        <div class="shuffle-label">여자 — 카드</div>
        <div class="card-tags" id="womenRedCards"></div>
      </div>
      <div class="shuffle-group">
        <div class="shuffle-label">빈 자리</div>
        <div class="card-tags" id="emptyCards"></div>
      </div>
      <div class="shuffle-group" id="tableVisGroup" style="display:none">
        <div class="shuffle-label">테이블 배치</div>
        <div class="table-vis-wrap">
          <div class="table-vis">
            <div class="table-vis-label">왼쪽 테이블</div>
            <div class="seat-rows" id="leftTableVis"></div>
          </div>
          <div class="table-vis">
            <div class="table-vis-label">오른쪽 테이블</div>
            <div class="seat-rows" id="rightTableVis"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <p class="section-label">대기 목록</p>
    <div class="waiting-card" id="waitingList">
      <div class="waiting-empty">불러오는 중...</div>
    </div>
  </div>

  <div class="section" style="margin-top:1rem">
    <div class="stats-row-3">
      <div class="stat-mini">
        <p class="stat-mini-label">오늘 방문</p>
        <p class="stat-mini-val" id="todayVisits">—</p>
        <p class="stat-mini-unit">명</p>
      </div>
      <div class="stat-mini">
        <p class="stat-mini-label">오늘 등록</p>
        <p class="stat-mini-val" id="todayRegs">—</p>
        <p class="stat-mini-unit">팀</p>
      </div>
      <div class="stat-mini">
        <p class="stat-mini-label">전환율</p>
        <p class="stat-mini-val rate" id="todayRate">—</p>
        <p class="stat-mini-unit">등록/방문</p>
      </div>
    </div>
  </div>

  <div class="bottom-row">
    <button class="refresh-btn" onclick="refreshAll()">↻ 새로고침</button>
    <button class="reset-btn" onclick="resetAll()">영업 종료 / 초기화</button>
  </div>
</div>

<script>
const SHEET_ID = '1NmPb6wxX0usqeP-gd7cFQPgHecLQsCYcA3i3wcU3uwc';
const API_KEY = 'AIzaSyDNs6DjFlPRHukWl572r1pMZV72F6ZtODI';
const RANGE = '시트1!A:H';
const ADMIN_PW = '1128';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzvIfxTPJVZUfjED-3XwLcHKRfbHouWLVFh9grynew8FdjUavr5nikX5wJMDdcYf1vH/exec';
const TABLE_MAX = 26;

let rawRows = [];
let allItems = [];
let starred = JSON.parse(localStorage.getItem('starred') || '[]');
let hearted = JSON.parse(localStorage.getItem('hearted') || '[]');
let seats = JSON.parse(localStorage.getItem('seats') || '{"tM":0,"tF":0}');
let isFull = false;

let itemStates = JSON.parse(localStorage.getItem('itemStates2') || '{}');
let itemRows = JSON.parse(localStorage.getItem('itemRows') || '{}');

function getKey(row) { return (row[3]||'') + '|' + (row[6]||''); }

function saveStates() {
  localStorage.setItem('itemStates2', JSON.stringify(itemStates));
  localStorage.setItem('itemRows', JSON.stringify(itemRows));
}
function saveStarred() { localStorage.setItem('starred', JSON.stringify(starred)); }
function saveHearted() { localStorage.setItem('hearted', JSON.stringify(hearted)); }

// 쿠키 설정/삭제
function setStaffCookie() {
  document.cookie = 'wooyeon_staff=1; path=/; max-age=604800'; // 7일
}
function clearStaffCookie() {
  document.cookie = 'wooyeon_staff=; path=/; max-age=0';
}

// 등록 화면 열기 (새 탭)
function openIndexPage() {
  window.open('https://wooyeonbar.github.io/wooyeonwaiting/', '_blank');
}

// 팝업
function showPopup(title, sub, btns) {
  document.getElementById('popupTitle').textContent = title;
  document.getElementById('popupSub').textContent = sub || '';
  const btnsEl = document.getElementById('popupBtns');
  btnsEl.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'popup-btn ' + (b.cls || 'secondary');
    btn.textContent = b.label;
    btn.onclick = () => { closePopup(); b.action(); };
    btnsEl.appendChild(btn);
  });
  document.getElementById('popupOverlay').classList.add('active');
}
function closePopup() { document.getElementById('popupOverlay').classList.remove('active'); }

function doLogin() {
  if (document.getElementById('pwInput').value === ADMIN_PW) {
    setStaffCookie(); // 직원 쿠키 저장
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    initAdmin();
  } else { document.getElementById('loginErr').textContent = '비밀번호가 틀렸어요.'; }
}

// 오늘 날짜 (한국시간 기준)
function getTodayKST() {
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  return kst.toISOString().substring(0, 10);
}

async function syncSettings() {
  try {
    const r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent('설정!A1:A6')+'?key='+API_KEY);
    const d = await r.json();
    if (!d.error && d.values) {
      isFull = d.values[0] && d.values[0][0] === 'TRUE';
      seats.tM = parseInt(d.values[2] && d.values[2][0]) || 0;
      seats.tF = parseInt(d.values[3] && d.values[3][0]) || 0;
      localStorage.setItem('seats', JSON.stringify(seats));
      // GAS에 현재 자리 상태 동기화 (isFull/remain이 틀어진 경우 보정)
      const tTotal = seats.tM + seats.tF;
      const remain = Math.max(TABLE_MAX - tTotal, 0);
      isFull = isFull || tTotal >= TABLE_MAX;
      fetch(GAS_URL + '?type=setFull&value=' + (isFull ? 'TRUE' : 'FALSE'));
      fetch(GAS_URL + '?type=setSeats&value=' + remain);
    }
  } catch(e) {}
  const tMEl = document.getElementById('tM');
  const tFEl = document.getElementById('tF');
  if (tMEl) tMEl.value = seats.tM || 0;
  if (tFEl) tFEl.value = seats.tF || 0;
  updateSeatUI('t', TABLE_MAX);
  updateOpStatusUI();
}

// 오늘 방문자/전환율 불러오기
async function loadTodayStats() {
  try {
    const r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent('설정!A7:A8')+'?key='+API_KEY);
    const d = await r.json();
    const today = getTodayKST();
    let visitCount = 0;
    if (!d.error && d.values && d.values.length >= 2) {
      const storedDate = d.values[0][0] || '';
      if (storedDate === today) {
        visitCount = parseInt(d.values[1][0]) || 0;
      }
    }
    // 오늘 등록 수 (rawRows에서 오늘 날짜 필터)
    const todayRegs = rawRows.filter(r => (r[2]||'').startsWith(today)).length;
    const rate = visitCount > 0 ? Math.round(todayRegs / visitCount * 100) : 0;

    document.getElementById('todayVisits').textContent = visitCount;
    document.getElementById('todayRegs').textContent = todayRegs;
    document.getElementById('todayRate').textContent = visitCount > 0 ? rate + '%' : '—';
  } catch(e) {}
}

function setSeatDirect(id, val) {
  const mEl = document.getElementById('tM');
  const fEl = document.getElementById('tF');
  const m = parseInt(mEl.value)||0;
  const f = parseInt(fEl.value)||0;
  const other = id.endsWith('M') ? f : m;
  let v = parseInt(val)||0;
  if (v < 0) v = 0;
  if (v + other > TABLE_MAX) v = TABLE_MAX - other;
  const el = document.getElementById(id);
  el.value = v;
  seats[id] = v;
  localStorage.setItem('seats', JSON.stringify(seats));
  updateSeatUI('t', TABLE_MAX);
  fetch(GAS_URL + '?type=setSeatDetail&tM='+seats.tM+'&tF='+seats.tF+'&bM=0&bF=0');
  const tTotal = (parseInt(seats.tM)||0) + (parseInt(seats.tF)||0);
  const remain = Math.max(TABLE_MAX - tTotal, 0);
  isFull = tTotal >= TABLE_MAX;
  updateOpStatusUI();
  fetch(GAS_URL + '?type=setFull&value=' + (isFull ? 'TRUE' : 'FALSE'));
  fetch(GAS_URL + '?type=setSeats&value=' + remain);
}

function updateSeat(id, delta) {
  const mEl = document.getElementById('tM');
  const fEl = document.getElementById('tF');
  const m = parseInt(mEl.value)||0;
  const f = parseInt(fEl.value)||0;
  if (delta > 0 && m + f >= TABLE_MAX) return;
  const el = document.getElementById(id);
  let val = (parseInt(el.value)||0) + delta;
  if (val < 0) val = 0;
  el.value = val;
  seats[id] = val;
  localStorage.setItem('seats', JSON.stringify(seats));
  updateSeatUI('t', TABLE_MAX);
  fetch(GAS_URL + '?type=setSeatDetail&tM='+seats.tM+'&tF='+seats.tF+'&bM=0&bF=0');
  const tTotal = (parseInt(seats.tM)||0) + (parseInt(seats.tF)||0);
  const remain = Math.max(TABLE_MAX - tTotal, 0);
  isFull = tTotal >= TABLE_MAX;
  updateOpStatusUI();
  fetch(GAS_URL + '?type=setFull&value=' + (isFull ? 'TRUE' : 'FALSE'));
  fetch(GAS_URL + '?type=setSeats&value=' + remain);
}

function updateSeatUI(prefix, max) {
  const mEl = document.getElementById('tM');
  const fEl = document.getElementById('tF');
  const m = parseInt(mEl.value)||0;
  const f = parseInt(fEl.value)||0;
  const total = m + f;
  const remain = Math.max(max - total, 0);
  document.getElementById('tMBar').style.width = Math.min(m/max*100,100) + '%';
  document.getElementById('tFBar').style.width = Math.min(f/max*100,100) + '%';
  document.getElementById('tMetaNums').textContent = '남 '+m+'명 / 여 '+f+'명 / 총 '+total+'명';
  const mP = document.getElementById('tMPlus');
  const fP = document.getElementById('tFPlus');
  if (mP) mP.disabled = total >= max;
  if (fP) fP.disabled = total >= max;
  const el = document.getElementById('tRemain');
  if (remain === 0) { el.textContent = '만석!'; el.className = 'seat-remain full'; }
  else if (remain <= 3) { el.textContent = '남은 자리 '+remain+'명'; el.className = 'seat-remain warn'; }
  else { el.textContent = '남은 자리 '+remain+'명'; el.className = 'seat-remain ok'; }
  // 자리 섞기 버튼: 13명 이상일 때만 활성화
  const shuffleBtn = document.getElementById('shuffleBtn');
  if (shuffleBtn) shuffleBtn.disabled = total < 13;
  // 인원 바뀌면 결과 닫기
  const shuffleResult = document.getElementById('shuffleResult');
  if (shuffleResult) shuffleResult.classList.remove('active');
}

function updateOpStatusUI() {
  const dot = document.getElementById('opDot');
  const text = document.getElementById('opText');
  if (isFull) {
    dot.className = 'op-dot on';
    text.textContent = '만석 — 웨이팅 등록 가능';

  } else {
    dot.className = 'op-dot off';
    text.textContent = '웨이팅 불가';
    text.style.color = 'var(--text3)';
  }
}

}

function getActionBtns(key, row) {
  const phone = row[6]||'';
  const state = itemStates[key] || null;
  const safeKey = key.replace(/'/g, "\\'");

  if (state === 'done') return `<div class="action-btns"><button class="action-btn done-label">입장완료</button></div>`;
  if (state === 'noshow') return `<div class="action-btns"><button class="action-btn noshow-label">노쇼</button></div>`;
  if (state === 'noreply') return `<div class="action-btns"><button class="action-btn noreply-label">미응답</button></div>`;
  if (state === 'visitx') return `<div class="action-btns"><button class="action-btn visitx-label">방문X</button></div>`;
  if (state === 'coming') {
    return `<div class="action-btns">
      <button class="action-btn" onclick="sendSMS('${safeKey}')">문자</button>
      <button class="action-btn call" onclick="callGuest('${phone}')">전화</button>
      <button class="action-btn coming" onclick="clickComing('${safeKey}')">오는 중</button>
    </div>`;
  }
  return `<div class="action-btns">
    <button class="action-btn" onclick="sendSMS('${safeKey}')">문자</button>
    <button class="action-btn call" onclick="callGuest('${phone}')">전화</button>
    <button class="action-btn confirm-o" onclick="clickO('${safeKey}')">O</button>
    <button class="action-btn confirm-x" onclick="clickX('${safeKey}')">X</button>
  </div>`;
}

async function loadData() {
  try {
    const res = await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(RANGE)+'?key='+API_KEY);
    const data = await res.json();
    if (data.error) return;
    rawRows = (data.values||[]).slice(1).filter(r => r[3] && r[3].toString().trim() !== '');

    const activeKeys = new Set(rawRows.map(r => getKey(r)));
    const greyKeys = Object.keys(itemStates).filter(k =>
      ['done','noshow','noreply','visitx'].includes(itemStates[k]) && !activeKeys.has(k)
    );

    rawRows.forEach(r => { itemRows[getKey(r)] = r; });
    localStorage.setItem('itemRows', JSON.stringify(itemRows));
    allItems = rawRows.map(r => ({ row: r, key: getKey(r) }));

    greyKeys.forEach(k => {
      if (!allItems.find(it => it.key === k)) {
        const savedRow = itemRows[k] || null;
        const [name, phone] = k.split('|');
        const row = savedRow || ['','','',name,'','',phone,''];
        allItems.push({ row, key: k, isGhost: true });
      }
    });

    starred = starred.filter(k => allItems.some(it => it.key === k));
    hearted = hearted.filter(k => allItems.some(it => it.key === k));
    saveStarred(); saveHearted();

    renderList();
    updateStats();
    await loadTodayStats();
  } catch(e) {}
}

const removedStates = ['done','noshow','noreply','visitx'];

function updateStats() {
  const active = allItems.filter(it => !removedStates.includes(itemStates[it.key]));
  document.getElementById('totalCount').textContent = active.length;
  document.getElementById('totalPeople').textContent = active.reduce((s,it) => s+(parseInt(it.row[5])||0), 0);
}

function showShuffle() {
  const M = parseInt(seats.tM) || 0;
  const F = parseInt(seats.tF) || 0;
  const T = M + F;
  const el = document.getElementById('shuffleResult');

  // 토글: 이미 열려 있으면 닫기
  if (el.classList.contains('active')) {
    el.classList.remove('active');
    return;
  }

  // lookup table 기반 배치
  const key = `M${M}_F${F}`;
  const data = SEATING_DATA[key];
  if (!data) return;

  // 카드 태그
  const tag = (n, cls) => `<span class="card-tag ${cls}">${n}</span>`;
  const tagList = (arr, cls) => arr.map(n => tag(n, cls)).join('');
  const sep = `<span class="shuffle-divider">+</span>`;

  document.getElementById('menCards').innerHTML =
    tagList(data.mb, 'black') + (data.mr.length ? sep + tagList(data.mr, 'extra-red') : '');
  document.getElementById('womenRedCards').innerHTML =
    tagList(data.fr, 'red-card') + (data.fb.length ? sep + tagList(data.fb, 'extra-black') : '');
  document.getElementById('emptyCards').innerHTML =
    tagList(data.eb, 'empty-black') + tagList(data.er, 'empty-red');

  // 테이블 배치 시각화
  const L_DEF = {
    outer:[['K','red'],['A','red'],['2','blue'],['3','red'],['4','blue'],['5','red'],['6','blue']],
    inner:[['A','blue'],['2','red'],['3','blue'],['4','red'],['5','blue']]
  };
  const R_DEF = {
    outer:[['6','red'],['7','blue'],['8','red'],['9','blue'],['10','red'],['J','blue'],['Q','red'],['K','blue']],
    inner:[['7','red'],['8','blue'],['9','red'],['10','blue'],['J','red'],['Q','blue']]
  };
  function renderRow(defs, occ) {
    return defs.map(([card,color],i) => {
      const cls = occ[i]==='M'?'man':occ[i]==='F'?'woman':(color==='blue'?'empty-b':'empty-r');
      return `<div class="seat ${cls}">${card}</div>`;
    }).join('');
  }
  document.getElementById('leftTableVis').innerHTML =
    `<div class="row-outer">${renderRow(L_DEF.outer,data.lo)}</div>` +
    `<div class="row-inner"><div class="seat-spacer"></div>${renderRow(L_DEF.inner,data.li)}</div>`;
  document.getElementById('rightTableVis').innerHTML =
    `<div class="row-outer">${renderRow(R_DEF.outer,data.ro)}</div>` +
    `<div class="row-inner"><div class="seat-spacer"></div>${renderRow(R_DEF.inner,data.ri)}</div>`;
  document.getElementById('tableVisGroup').style.display = '';

  el.classList.add('active');
}

function renderList() {
  const el = document.getElementById('waitingList');
  if (!allItems.length) { el.innerHTML = '<div class="waiting-empty">현재 대기 없음</div>'; return; }

  const sorted = [...allItems].sort((a, b) => {
    const aS = starred.includes(a.key);
    const bS = starred.includes(b.key);
    if (aS && !bS) return -1;
    if (!aS && bS) return 1;
    return 0;
  });

  let displayNum = 0;
  el.innerHTML = sorted.map(({row, key, isGhost}) => {
    const isStarred = starred.includes(key);
    const isHearted = hearted.includes(key);
    const state = itemStates[key] || null;
    const isGreyed = removedStates.includes(state);
    const isComing = state === 'coming';
    const gender = row[4]||'';
    const gClass = gender==='남성'?'male':'female';
    const seat = row[7]||'테이블석';

    if (!isGreyed) displayNum++;

    let itemClass = '';
    if (isGreyed) itemClass = 'greyed';
    else if (isComing) itemClass = 'coming-state';
    else if (isHearted) itemClass = 'hearted';

    const safeKey = key.replace(/'/g, "\\'");

    return `<div class="waiting-item ${itemClass}">
      <div class="icon-btns">
        <button class="star-btn ${isStarred?'active':''}" onclick="toggleStar('${safeKey}')">★</button>
        <button class="heart-btn ${isHearted?'active':''}" onclick="toggleHeart('${safeKey}')">♥</button>
      </div>
      <span class="waiting-num">${isGreyed ? '—' : displayNum}</span>
      <div class="waiting-info">
        <div class="name-row">
          <span class="waiting-name">${row[3]||'—'}</span>
          ${gender ? `<span class="gender-badge ${gClass}">${gender}</span>` : ''}
          ${getSeatBadge(seat)}
        </div>
        <p class="waiting-meta">${row[5]?row[5]+'명 · ':''}${getTimeStr(row)}${row[6]?' · '+row[6]:''}</p>
      </div>
      ${getActionBtns(key, row)}
    </div>`;
  }).join('');
}
