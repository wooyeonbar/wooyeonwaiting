<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웨이팅 현황</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #fafafa; display: flex; justify-content: center; padding: 2rem 1rem; }
.wrap { width: 100%; max-width: 420px; }
.store { font-size: 11px; color: #999; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.4rem; }
.title { font-size: 22px; font-weight: 500; color: #111; margin-bottom: 1.5rem; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card { background: #f2f2f2; border-radius: 12px; padding: 1.25rem 1rem; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 6px; }
.stat-value { font-size: 36px; font-weight: 500; color: #111; line-height: 1; }
.stat-unit { font-size: 13px; color: #888; margin-top: 4px; }
.my-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
.my-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; }
.my-label { font-size: 13px; color: #888; }
.my-val { font-size: 14px; font-weight: 500; color: #111; }
.divider { border: none; border-top: 1px solid #f0f0f0; }
.notice { font-size: 12px; color: #aaa; text-align: center; line-height: 1.7; margin-bottom: 1rem; }
.refresh-btn { display: block; width: 100%; font-size: 13px; color: #666; background: none; border: 1px solid #ddd; border-radius: 8px; padding: 10px; cursor: pointer; }
.refresh-btn:hover { background: #f5f5f5; }
.error { color: #e24b4a; font-size: 12px; text-align: center; padding: 1rem 0; }
</style>
</head>
<body>
<div class="wrap">
  <p class="store">혼술바 우연 을지로</p>
  <p class="title">실시간 웨이팅 현황</p>
  <div class="stat-grid">
    <div class="stat-card">
      <p class="stat-label">전체 대기</p>
      <p class="stat-value" id="total">…</p>
      <p class="stat-unit">팀</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">내 앞 대기</p>
      <p class="stat-value" id="ahead">…</p>
      <p class="stat-unit">팀 남음</p>
    </div>
  </div>
  <div class="my-card">
    <div class="my-row">
      <span class="my-label">접수 번호</span>
      <span class="my-val" id="mynum">확인 중…</span>
    </div>
    <hr class="divider">
    <div class="my-row">
      <span class="my-label">성함</span>
      <span class="my-val" id="myname">확인 중…</span>
    </div>
    <hr class="divider">
    <div class="my-row">
      <span class="my-label">인원</span>
      <span class="my-val" id="mypeople">확인 중…</span>
    </div>
  </div>
  <p class="notice">30초마다 자동 업데이트 됩니다<br>입장 순서가 되면 연락드릴게요 :)</p>
  <button class="refresh-btn" onclick="loadData()">지금 새로고침</button>
  <div id="errmsg"></div>
</div>
<script>
const SHEET_ID = '1NmPb6wxX0usqeP-gd7cFQPgHecLQsCYcA3i3wcU3uwc';
const API_KEY = 'AIzaSyDNs6DjFlPRHukWl572r1pMZV72F6ZtODI';
const RANGE = 'Sheet1!A:G';

function getParam(key) {
  try { return new URLSearchParams(window.location.search).get(key) || ''; }
  catch(e) { return ''; }
}

async function loadData() {
  document.getElementById('errmsg').innerHTML = '';
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) {
      document.getElementById('errmsg').innerHTML = `<p class="error">오류: ${data.error.message}</p>`;
      return;
    }
    const rows = (data.values || []).slice(1).filter(r => r[3]);
    document.getElementById('total').textContent = rows.length;
    const myName = getParam('name');
    let myIndex = -1;
    if (myName) myIndex = rows.findIndex(r => r[3] && r[3].trim() === myName.trim());
    if (myIndex >= 0) {
      const myRow = rows[myIndex];
      document.getElementById('mynum').textContent = (myIndex + 1) + '번';
      document.getElementById('myname').textContent = myRow[3] || '—';
      document.getElementById('mypeople').textContent = (myRow[5] || '—') + '명';
      document.getElementById('ahead').textContent = myIndex;
    } else {
      document.getElementById('mynum').textContent = '—';
      document.getElementById('myname').textContent = myName || '—';
      document.getElementById('mypeople').textContent = '—';
      document.getElementById('ahead').textContent = '—';
    }
  } catch(e) {
    document.getElementById('errmsg').innerHTML = '<p class="error">데이터를 불러오지 못했어요.</p>';
  }
}
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
