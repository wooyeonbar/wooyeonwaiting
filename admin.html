<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우연 — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f7f6f4; --surface: #ffffff; --surface2: #f2f1ef;
  --border: #e8e6e2; --border2: #d8d6d2;
  --text: #1a1916; --text2: #6e6b66; --text3: #a8a49e;
  --accent: #1a1916; --danger: #c0503e; --success: #4a8c5c;
  --warning: #b87c2a; --male: #4a7ab8; --female: #b84a7a;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2rem 1.5rem; width: 100%; max-width: 320px; }
.login-title { font-size: 18px; font-weight: 400; margin-bottom: 0.3rem; }
.login-sub { font-size: 12px; color: var(--text3); margin-bottom: 1.5rem; }
.login-input { width: 100%; padding: 11px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; outline: none; margin-bottom: 10px; }
.login-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
.login-err { font-size: 12px; color: var(--danger); margin-top: 8px; min-height: 16px; text-align: center; }
.admin { display: none; max-width: 480px; margin: 0 auto; padding: 0 1rem 4rem; }
.admin-header { padding: 1.5rem 0 1rem; display: flex; justify-content: space-between; align-items: center; }
.admin-title { font-size: 18px; font-weight: 400; }
.logout-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; }
.section { margin-bottom: 1rem; }
.section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.6rem; }
.seat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; margin-bottom: 8px; }
.seat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.7rem; }
.seat-name { font-size: 12px; font-weight: 500; }
.seat-meta { text-align: right; }
.seat-meta-nums { font-size: 11px; color: var(--text2); }
.seat-meta-cap { font-size: 10px; color: var(--text3); margin-top: 1px; }
.seat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.seat-input-wrap { display: flex; align-items: center; gap: 6px; }
.seat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.seat-dot.male { background: var(--male); }
.seat-dot.female { background: var(--female); }
.seat-label { font-size: 11px; color: var(--text2); flex: 1; }
.counter { display: flex; align-items: center; }
.counter-btn { width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border); font-size: 16px; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.counter-btn:first-child { border-radius: 6px 0 0 6px; }
.counter-btn:last-child { border-radius: 0 6px 6px 0; }
.counter-btn:hover:not(:disabled) { background: var(--border); }
.counter-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.counter-val { width: 32px; height: 28px; background: var(--bg); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); display: flex; align-items: center; justify-content: center; }
.seat-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.seat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.seat-bar-fill.male { background: var(--male); }
.seat-bar-fill.female { background: var(--female); }
.op-status { display: flex; align-items: center; gap: 7px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.op-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.op-dot.on { background: var(--danger); box-shadow: 0 0 5px var(--danger); animation: pulse 2s infinite; }
.op-dot.off { background: var(--text3); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.op-text { font-size: 12px; }
.seat-remain { font-size: 11px; margin-left: auto; font-weight: 500; }
.seat-remain.ok { color: var(--success); }
.seat-remain.warn { color: var(--warning); }
.seat-remain.full { color: var(--danger); }

/* 별표 우선순위 배너 */
.starred-section { margin-bottom: 1rem; }
.starred-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.starred-item.rank1 { border-color: #f0b429; background: #fffbf0; }
.starred-item.rank2 { border-color: #c0c0d0; background: #f8f8ff; }
.starred-item.rank3 { border-color: var(--border2); }
.rank-label { font-size: 11px; font-weight: 600; min-width: 22px; flex-shrink: 0; }
.rank-label.r1 { color: #c89010; }
.rank-label.r2 { color: #8888a8; }
.rank-label.r3 { color: var(--text3); }
.starred-empty { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; font-size: 12px; color: var(--text3); }

/* 대기 목록 */
.waiting-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.waiting-empty { padding: 2rem; text-align: center; font-size: 13px; color: var(--text3); }
.waiting-item { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; transition: border-color 0.2s; }
.waiting-item:last-child { border-bottom: none; }
.waiting-item.hearted { outline: 2px solid #e879a8; outline-offset: -2px; background: #fff5f9; }

/* 아이콘 버튼들 */
.icon-btns { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.star-btn { background: none; border: none; font-size: 15px; cursor: pointer; flex-shrink: 0; line-height: 1; padding: 3px; color: var(--border2); transition: color 0.15s; }
.star-btn.active { color: #f0b429; }
.heart-btn { background: none; border: none; font-size: 15px; cursor: pointer; flex-shrink: 0; line-height: 1; padding: 3px; color: var(--border2); transition: color 0.15s; }
.heart-btn.active { color: #e879a8; }

.waiting-num { font-size: 11px; color: var(--text3); min-width: 18px; flex-shrink: 0; }
.waiting-info { flex: 1; min-width: 0; }
.name-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.waiting-name { font-size: 13px; font-weight: 500; }
.waiting-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
.gender-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
.gender-badge.male { background: #eef3fb; color: var(--male); }
.gender-badge.female { background: #fbeef5; color: var(--female); }
.seat-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 500; flex-shrink: 0; }
.seat-badge.table { background: #eef3fb; color: #2a5fa8; }
.seat-badge.dodgy { background: #eef6f1; color: #2a7a4a; }
.seat-badge.free { background: #fdf6e0; color: #8a6020; }
.action-btns { display: flex; gap: 5px; flex-shrink: 0; }
.action-btn { padding: 5px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); }
.action-btn.call { background: #eef6f1; border-color: #c8e0d0; color: var(--success); }
.action-btn.enter { background: var(--accent); border-color: var(--accent); color: #fff; }
.action-btn.coming { background: #888; border-color: #888; color: #fff; }
.action-btn.confirm-o { background: var(--success); border-color: var(--success); color: #fff; font-weight: 600; }
.action-btn.confirm-x { background: var(--danger); border-color: var(--danger); color: #fff; font-weight: 600; }
.waiting-item.coming-state { background: #f0f0f0; }

.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.stat-mini { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; }
.stat-mini-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.stat-mini-val { font-size: 26px; font-weight: 300; color: var(--text); line-height: 1; }
.stat-mini-unit { font-size: 11px; color: var(--text3); margin-top: 3px; }
.refresh-row { display: flex; justify-content: center; margin-top: 1rem; }
.refresh-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 6px 12px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.dot { display: inline-block; animation: blink 1.2s ease-in-out infinite; color: var(--text3); font-size: 22px; line-height: 1; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <p class="login-title">관리자 로그인</p>
    <p class="login-sub">혼술바 우연 을지로</p>
    <input class="login-input" type="password" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<div class="admin" id="adminWrap">
  <div class="admin-header">
    <p class="admin-title">관리자</p>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="section">
    <div class="stats-row">
      <div class="stat-mini">
        <p class="stat-mini-label">전체 대기</p>
        <p class="stat-mini-val" id="totalCount"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span></p>
        <p class="stat-mini-unit">팀</p>
      </div>
      <div class="stat-mini">
        <p class="stat-mini-label">대기 인원</p>
        <p class="stat-mini-val" id="totalPeople"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span></p>
        <p class="stat-mini-unit">명</p>
      </div>
    </div>
  </div>

  <div class="section">
    <p class="section-label">현재 매장 현황</p>
    <div class="seat-card">
      <div class="seat-header">
        <span class="seat-name">테이블석</span>
        <div class="seat-meta">
          <div class="seat-meta-nums" id="tMetaNums">남 0명 / 여 0명 / 총 0명</div>
          <div class="seat-meta-cap">최대 26명</div>
        </div>
      </div>
      <div class="seat-row">
        <div class="seat-input-wrap">
          <div class="seat-dot male"></div>
          <span class="seat-label">남성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('tM',-1)">−</button>
            <div class="counter-val" id="tM">0</div>
            <button class="counter-btn" id="tMPlus" onclick="updateSeat('tM',1)">+</button>
          </div>
        </div>
        <div class="seat-input-wrap">
          <div class="seat-dot female"></div>
          <span class="seat-label">여성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('tF',-1)">−</button>
            <div class="counter-val" id="tF">0</div>
            <button class="counter-btn" id="tFPlus" onclick="updateSeat('tF',1)">+</button>
          </div>
        </div>
      </div>
      <div class="seat-bar"><div class="seat-bar-fill male" id="tMBar" style="width:0%"></div></div>
      <div class="seat-bar" style="margin-top:3px"><div class="seat-bar-fill female" id="tFBar" style="width:0%"></div></div>
      <div class="op-status">
        <div class="op-dot off" id="opDot"></div>
        <span class="op-text" id="opText" style="color:var(--text3)">웨이팅 불가</span>
        <span class="seat-remain ok" id="tRemain">남은 자리 26명</span>
      </div>
    </div>
    <div class="seat-card">
      <div class="seat-header">
        <span class="seat-name">닷지석</span>
        <div class="seat-meta">
          <div class="seat-meta-nums" id="bMetaNums">남 0명 / 여 0명 / 총 0명</div>
          <div class="seat-meta-cap">최대 6명</div>
        </div>
      </div>
      <div class="seat-row">
        <div class="seat-input-wrap">
          <div class="seat-dot male"></div>
          <span class="seat-label">남성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('bM',-1)">−</button>
            <div class="counter-val" id="bM">0</div>
            <button class="counter-btn" id="bMPlus" onclick="updateSeat('bM',1)">+</button>
          </div>
        </div>
        <div class="seat-input-wrap">
          <div class="seat-dot female"></div>
          <span class="seat-label">여성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('bF',-1)">−</button>
            <div class="counter-val" id="bF">0</div>
            <button class="counter-btn" id="bFPlus" onclick="updateSeat('bF',1)">+</button>
          </div>
        </div>
      </div>
      <div class="seat-bar"><div class="seat-bar-fill male" id="bMBar" style="width:0%"></div></div>
      <div class="seat-bar" style="margin-top:3px"><div class="seat-bar-fill female" id="bFBar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- 대기 목록 -->
  <div class="section">
    <p class="section-label">대기 목록</p>
    <div class="waiting-card" id="waitingList">
      <div class="waiting-empty">불러오는 중...</div>
    </div>
  </div>

  <div class="refresh-row">
    <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
  </div>
</div>

<script>
const SHEET_ID = '1NmPb6wxX0usqeP-gd7cFQPgHecLQsCYcA3i3wcU3uwc';
const API_KEY = 'AIzaSyDNs6DjFlPRHukWl572r1pMZV72F6ZtODI';
const RANGE = '시트1!A:H';
const ADMIN_PW = '1128';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzvIfxTPJVZUfjED-3XwLcHKRfbHouWLVFh9grynew8FdjUavr5nikX5wJMDdcYf1vH/exec';
const TABLE_MAX = 26;
const SETTINGS_RANGE = '설정!A1:A6';
const BAR_MAX = 6;

let rawRows = [];
let starred = JSON.parse(localStorage.getItem('starred') || '[]');
let hearted = JSON.parse(localStorage.getItem('hearted') || '[]');
let seats = JSON.parse(localStorage.getItem('seats') || '{"tM":0,"tF":0,"bM":0,"bF":0}');
let isFull = false;
let lastRowCount = -1; // 이전 대기 인원 수 추적

// 브라우저 알림 권한 요청
function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function sendBrowserNotification(row) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const seat = row[7] || '테이블석';
  const seatLabel = seat === '프리패스' ? '🥃 프리패스' : seat === '바자리' ? '닷지석' : '테이블석';
  const n = new Notification('🔔 새 웨이팅 등록!', {
    body: row[3] + ' · ' + row[4] + ' · ' + row[5] + '명 · ' + seatLabel,
    icon: 'https://wooyeonbar.github.io/wooyeonwaiting/favicon.ico',
    badge: 'https://wooyeonbar.github.io/wooyeonwaiting/favicon.ico',
    tag: 'waiting-' + Date.now()
  });
  n.onclick = function() { window.focus(); };
}
let comingSet = JSON.parse(localStorage.getItem('comingSet') || '[]');

function doLogin() {
  if (document.getElementById('pwInput').value === ADMIN_PW) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    initAdmin();
  } else { document.getElementById('loginErr').textContent = '비밀번호가 틀렸어요.'; }
}
function doLogout() {
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

async function initAdmin() {
  requestNotificationPermission();
  ['tM','tF','bM','bF'].forEach(k => { document.getElementById(k).textContent = seats[k] || 0; });
  updateSeatUI('t', TABLE_MAX);
  updateSeatUI('b', BAR_MAX);
  // 구글시트에서 현재 만석 상태 읽어오기
  try {
    const r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent('설정!A1')+'?key='+API_KEY);
    const d = await r.json();
    if (!d.error && d.values) {
      isFull = d.values[0][0] === 'TRUE';
      updateOpStatusUI();
    }
  } catch(e) {}
  loadData();
  setInterval(loadData, 30000);
}

function updateSeat(id, delta) {
  const prefix = id[0];
  const max = prefix === 't' ? TABLE_MAX : BAR_MAX;
  const m = parseInt(document.getElementById(prefix+'M').textContent)||0;
  const f = parseInt(document.getElementById(prefix+'F').textContent)||0;
  if (delta > 0 && m + f >= max) return;
  const el = document.getElementById(id);
  let val = parseInt(el.textContent) + delta;
  if (val < 0) val = 0;
  el.textContent = val;
  seats[id] = val;
  localStorage.setItem('seats', JSON.stringify(seats));
  updateSeatUI(prefix, max);
  // 모든 좌석 변경을 구글시트에 저장
  const tTotal = (parseInt(seats.tM)||0) + (parseInt(seats.tF)||0);
  fetch(GAS_URL + '?type=setSeatDetail&tM='+seats.tM+'&tF='+seats.tF+'&bM='+seats.bM+'&bF='+seats.bF);
  if (prefix === 't') {
    const remain = Math.max(TABLE_MAX - tTotal, 0);
    const newFull2 = tTotal >= TABLE_MAX;
    isFull = newFull2;
    updateOpStatusUI();
    fetch(GAS_URL + '?type=setFull&value=' + isFull);
    fetch(GAS_URL + '?type=setSeats&value=' + remain);
  }
}

function updateSeatUI(prefix, max) {
  const m = parseInt(document.getElementById(prefix+'M').textContent)||0;
  const f = parseInt(document.getElementById(prefix+'F').textContent)||0;
  const total = m + f;
  const remain = Math.max(max - total, 0);
  document.getElementById(prefix+'MBar').style.width = Math.min(m/max*100,100) + '%';
  document.getElementById(prefix+'FBar').style.width = Math.min(f/max*100,100) + '%';
  document.getElementById(prefix+'MetaNums').textContent = '남 '+m+'명 / 여 '+f+'명 / 총 '+total+'명';
  const mP = document.getElementById(prefix+'MPlus');
  const fP = document.getElementById(prefix+'FPlus');
  if (mP) mP.disabled = total >= max;
  if (fP) fP.disabled = total >= max;
  if (prefix === 't') {
    const el = document.getElementById('tRemain');
    if (remain === 0) { el.textContent = '만석!'; el.className = 'seat-remain full'; }
    else if (remain <= 3) { el.textContent = '남은 자리 '+remain+'명'; el.className = 'seat-remain warn'; }
    else { el.textContent = '남은 자리 '+remain+'명'; el.className = 'seat-remain ok'; }
  }
}

function updateOpStatusUI() {
  const dot = document.getElementById('opDot');
  const text = document.getElementById('opText');
  if (isFull) {
    dot.className = 'op-dot on';
    text.textContent = '만석 — 웨이팅 등록 가능';
    text.style.color = 'var(--danger)';
  } else {
    dot.className = 'op-dot off';
    text.textContent = '웨이팅 불가';
    text.style.color = 'var(--text3)';
  }
}

// 별표 토글 - 별표 있으면 목록 상단으로
function toggleStar(rawIdx) {
  const i = starred.indexOf(rawIdx);
  if (i >= 0) starred.splice(i, 1);
  else starred.push(rawIdx);
  localStorage.setItem('starred', JSON.stringify(starred));
  renderList();
}

// 하트 토글
function toggleHeart(rawIdx) {
  const i = hearted.indexOf(rawIdx);
  if (i >= 0) hearted.splice(i, 1);
  else hearted.push(rawIdx);
  localStorage.setItem('hearted', JSON.stringify(hearted));
  renderList();
}

function callGuest(phone) {
  window.location.href = 'tel:' + phone.replace(/[^0-9]/g, '');
}

function sendSMS(rawIdx) {
  const row = rawRows[rawIdx];
  if (!row) return;
  const name = row[3]||'', phone = row[6]||'';
  const msg = '[혼술바 우연] '+name+'님, 곧 입장 가능합니다! 5분 내로 오시지 않으면 다음 순번으로 넘어가요 :)';
  if (confirm(name+'님에게 문자를 발송할까요?\n\n'+msg)) {
    alert('알리고 API 연동 후 자동 발송 가능합니다.\n번호: '+phone);
  }
}

async function confirmO(rawIdx) {
  // O 버튼 → 오는 중 상태로
  comingSet.push(rawIdx);
  localStorage.setItem('comingSet', JSON.stringify(comingSet));
  renderList();
}

async function confirmX(rawIdx) {
  // X 버튼 → 바로 삭제
  if (!confirm('삭제하시겠습니까?')) return;
  await deleteGuest(rawIdx);
}

async function confirmComing(rawIdx) {
  // 오는 중 다시 누름 → 입장 처리
  if (!confirm('입장 처리 하겠습니까?')) return;
  await deleteGuest(rawIdx);
}

async function deleteGuest(rawIdx) {
  const row = rawRows[rawIdx];
  if (!row) return;
  try {
    await fetch(GAS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ type: 'delete', name: row[3], phone: row[6] })
    });
  } catch(e) {}
  comingSet = comingSet.filter(i => i !== rawIdx);
  starred = starred.filter(i => i !== rawIdx);
  hearted = hearted.filter(i => i !== rawIdx);
  localStorage.setItem('comingSet', JSON.stringify(comingSet));
  localStorage.setItem('starred', JSON.stringify(starred));
  localStorage.setItem('hearted', JSON.stringify(hearted));
  await loadData();
}

function getSeatBadge(seat) {
  if (seat === '바자리') return '<span class="seat-badge dodgy">닷</span>';
  if (seat === '프리패스') return '<span class="seat-badge free">프</span>';
  return '<span class="seat-badge table">테</span>';
}

function getActionBtns(rawIdx, phone) {
  const isComing = comingSet.includes(rawIdx);
  if (isComing) {
    return `<div class="action-btns">
      <button class="action-btn" onclick="sendSMS(${rawIdx})">문자</button>
      <button class="action-btn call" onclick="callGuest('${phone}')">전화</button>
      <button class="action-btn coming" onclick="confirmComing(${rawIdx})">오는 중</button>
    </div>`;
  } else {
    return `<div class="action-btns">
      <button class="action-btn" onclick="sendSMS(${rawIdx})">문자</button>
      <button class="action-btn call" onclick="callGuest('${phone}')">전화</button>
      <button class="action-btn confirm-o" onclick="confirmO(${rawIdx})">O</button>
      <button class="action-btn confirm-x" onclick="confirmX(${rawIdx})">X</button>
    </div>`;
  }
}

function getTimeStr(row) {
  const t = row[2]||'';
  if (!t) return '';
  return t.substring(5,10).replace('-','/') + ' ' + t.substring(11,16);
}


async function loadData() {
  try {
    const res = await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(RANGE)+'?key='+API_KEY);
    const data = await res.json();
    if (data.error) return;
    const newRows = (data.values||[]).slice(1).filter(r => r[3] && r[3].toString().trim() !== '');
    // 새 등록 감지 → 알림
    if (lastRowCount >= 0 && newRows.length > lastRowCount) {
      const newOnes = newRows.slice(lastRowCount);
      newOnes.forEach(row => sendBrowserNotification(row));
    }
    lastRowCount = newRows.length;
    rawRows = newRows;
    // 삭제된 행 starred/hearted 정리
    starred = starred.filter(i => i < rawRows.length);
    hearted = hearted.filter(i => i < rawRows.length);
    comingSet = comingSet.filter(i => i < rawRows.length);
    localStorage.setItem('starred', JSON.stringify(starred));
    localStorage.setItem('hearted', JSON.stringify(hearted));
    localStorage.setItem('comingSet', JSON.stringify(comingSet));
    renderList();
    updateStats();
  } catch(e) {}
}

function updateStats() {
  document.getElementById('totalCount').textContent = rawRows.length;
  document.getElementById('totalPeople').textContent = rawRows.reduce((s,r) => s+(parseInt(r[5])||0), 0);
}

function renderList() {
  const el = document.getElementById('waitingList');
  if (!rawRows.length) { el.innerHTML = '<div class="waiting-empty">현재 대기 없음</div>'; return; }

  // 별표 있는 항목 먼저, 나머지는 원래 순서
  const sorted = rawRows.map((row, rawIdx) => ({ row, rawIdx }))
    .sort((a, b) => {
      const aS = starred.includes(a.rawIdx);
      const bS = starred.includes(b.rawIdx);
      if (aS && !bS) return -1;
      if (!aS && bS) return 1;
      return a.rawIdx - b.rawIdx;
    });

  el.innerHTML = sorted.map(({row, rawIdx}, displayIdx) => {
    const isStarred = starred.includes(rawIdx);
    const isHearted = hearted.includes(rawIdx);
    const gender = row[4]||'';
    const gClass = gender==='남성'?'male':'female';
    const seat = row[7]||'테이블석';
    const heartedClass = isHearted ? 'hearted' : '';
    const comingClass = comingSet.includes(rawIdx) ? 'coming-state' : '';

    return `<div class="waiting-item ${heartedClass} ${comingClass}">
      <div class="icon-btns">
        <button class="star-btn ${isStarred?'active':''}" onclick="toggleStar(${rawIdx})" title="${isStarred?'우선순번 해제':'우선순번 지정'}">★</button>
        <button class="heart-btn ${isHearted?'active':''}" onclick="toggleHeart(${rawIdx})">♥</button>
      </div>
      <span class="waiting-num">${displayIdx+1}</span>
      <div class="waiting-info">
        <div class="name-row">
          <span class="waiting-name">${row[3]||'—'}</span>
          <span class="gender-badge ${gClass}">${gender}</span>
          ${getSeatBadge(seat)}

        </div>
        <p class="waiting-meta">${row[5]||'—'}명 · ${getTimeStr(row)}</p>
      </div>
      ${getActionBtns(rawIdx, row[6]||'')}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
